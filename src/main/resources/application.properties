spring.application.name=UrbanPulse-Backend
server.port=8081

# Gemini AI — primary model, falls back automatically on failure
gemini.api.key=${GEMINI_API_KEY}
gemini.primary.model=gemini-3.1-flash-lite-preview
gemini.fallback.model=gemini-2.5-flash

# CORS — allow React dev server and Vercel deploy
cors.allowed.origins=${CORS_ORIGINS:http://localhost:5173,https://urban-pulse-frontend.vercel.app}
